<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | Pairing UI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#00ffe0;
--secondary:#0088ff;
--pink:#ff00ff;
--glass:rgba(255,255,255,0.07);
--muted:rgba(255,255,255,0.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#020617,#0f172a,#111827);
overflow:hidden;
}

/* glow background */
body::before{
content:"";
position:absolute;
width:350px;
height:350px;
background:radial-gradient(circle,#00ffe055,transparent 70%);
top:-80px;
left:-80px;
filter:blur(60px);
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:radial-gradient(circle,#ff00ff44,transparent 70%);
bottom:-80px;
right:-80px;
filter:blur(60px);
}

/* CARD */
.card{
width:100%;
max-width:420px;
padding:35px 25px;
border-radius:28px;
background:var(--glass);
backdrop-filter:blur(25px);
border:1px solid rgba(255,255,255,0.12);
position:relative;
overflow:hidden;
text-align:center;
color:#fff;
}

/* EDGE LIGHT */
.card::before{
content:"";
position:absolute;
inset:-2px;
border-radius:30px;
padding:2px;
background:linear-gradient(45deg,#00ffe0,#0088ff,#ff00ff,#00ffe0);
background-size:300% 300%;
animation:move 6s linear infinite;
z-index:-1;

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
}

@keyframes move{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ICON */
.icon{
width:85px;
height:85px;
margin:auto;
border-radius:22px;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 25px #00ffee55;
margin-bottom:15px;
}

/* TITLE */
h1{
font-size:26px;
margin-bottom:6px;
}

/* SUB */
.sub{
font-size:13px;
color:var(--muted);
letter-spacing:2px;
text-transform:uppercase;
margin-bottom:25px;
}

/* CODE BOX (PAIRED CODE COLOR) */
.code-box{
margin:15px auto 25px;
padding:18px;
border-radius:16px;
background:linear-gradient(135deg,#00ffe0,#0088ff,#ff00ff);
background-size:300% 300%;
animation:gradientMove 5s ease infinite;
color:#000;
font-weight:900;
font-size:20px;
letter-spacing:3px;
box-shadow:0 0 25px rgba(0,255,255,0.35);
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* BUTTONS */
.btn{
width:100%;
height:55px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:15px;
font-weight:800;
cursor:pointer;
color:#fff;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
transition:.25s;
}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.12);
}

.btn.primary{
background:linear-gradient(135deg,#00ffe0,#0088ff);
box-shadow:0 0 18px rgba(0,255,255,0.35);
}

/* FOOTER */
.footer{
margin-top:20px;
font-size:12px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="card">

<div class="icon">
<i class="fas fa-link"></i>
</div>

<h1>PAIRING CODE</h1>
<div class="sub">LUCVOICE-XMD Connection</div>

<div class="code-box">
XMD-9K2P-7LQ8
</div>

<button class="btn primary">
<i class="fas fa-copy"></i> Copy Code
</button>

<button class="btn">
<i class="fas fa-sync"></i> Generate New Code
</button>

<div class="footer">
Secure pairing system • LUCVOICE-XMD
</div>

</div>

</body>
</html>
