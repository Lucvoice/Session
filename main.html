<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCVOICE-XMD | Liquid Glass</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#00ffcc;
--secondary:#00aaff;
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.15);
--text:#ffffff;
--muted:rgba(255,255,255,0.65);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at top left,#00ffc344,transparent 40%),
radial-gradient(circle at bottom right,#0099ff44,transparent 40%),
linear-gradient(135deg,#030712,#0f172a,#111827);
padding:20px;
overflow:hidden;
}

.card{
width:100%;
max-width:420px;
padding:35px 28px;
border-radius:28px;
background:var(--glass);
backdrop-filter:blur(20px) saturate(180%);
-webkit-backdrop-filter:blur(20px) saturate(180%);
border:1px solid var(--border);
box-shadow:
0 8px 32px rgba(0,0,0,0.4),
inset 0 1px 1px rgba(255,255,255,0.2),
inset 0 -1px 1px rgba(255,255,255,0.05);
position:relative;
overflow:hidden;
}

.card::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.12),
transparent
);
transform:rotate(25deg);
animation:shine 6s linear infinite;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

.logo{
width:80px;
height:80px;
margin:auto;
border-radius:22px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:white;
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 25px #00ffee66;
margin-bottom:18px;
}

h1{
text-align:center;
font-size:28px;
font-weight:900;
color:var(--text);
letter-spacing:1px;
}

.sub{
text-align:center;
color:var(--muted);
font-size:13px;
margin-top:6px;
margin-bottom:28px;
letter-spacing:2px;
text-transform:uppercase;
}

.label{
text-align:center;
font-size:12px;
color:var(--muted);
margin-bottom:14px;
letter-spacing:1px;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
}

.btn{
height:58px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:700;
cursor:pointer;
color:white;
transition:0.25s;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.12);
}

.btn:hover{
transform:translateY(-3px);
background:rgba(255,255,255,0.12);
}

.btn.primary{
background:linear-gradient(135deg,var(--primary),var(--secondary));
box-shadow:0 0 18px rgba(0,255,255,0.4);
}

.footer{
text-align:center;
margin-top:22px;
font-size:12px;
color:var(--muted);
line-height:1.6;
}

.footer a{
color:#00ffee;
text-decoration:none;
}

.footer a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<i class="fas fa-robot"></i>
</div>

<h1>LUCVOICE-XMD</h1>
<div class="sub">Liquid Glass Session</div>

<div class="label">Choose connection method</div>

<div class="buttons">

<button class="btn primary" onclick="window.location.href='/qr'">
<i class="fas fa-qrcode"></i> QR Code
</button>

<button class="btn" onclick="window.location.href='/pair'">
<i class="fas fa-mobile-alt"></i> Pairing Code
</button>

</div>

<div class="footer">
Powered by <a href="#">LUCVOICE-XMD</a><br>
Support: <a href="https://wa.me/255768619068">WhatsApp</a>
</div>

</div>

</body>
</html>
